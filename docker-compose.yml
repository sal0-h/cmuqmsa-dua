services:
  duamaker:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - duamaker_data:/app/data
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
      - DATABASE_PATH=/app/data/duamaker.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/categories', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  duamaker_data:
